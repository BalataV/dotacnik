<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;700;800;900&subset=latin-ext&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{width:1080px;height:1920px;background:#FFD60A;background-image:radial-gradient(#e8c200 3px,transparent 3px);background-size:36px 36px;font-family:Nunito,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bubble{background:#fff;color:#15233B;border:6px solid #15233B;border-radius:28px;padding:22px 40px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:44px;box-shadow:8px 8px 0 #15233B;margin-bottom:34px}
.mascot{width:320px;height:346px;filter:drop-shadow(0 10px 0 rgba(0,0,0,.08))}
h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:104px;color:#15233B;margin:26px 0 14px;letter-spacing:-2px;text-align:center}
p.tag{font-weight:800;font-size:38px;color:#15233B;opacity:.85;max-width:760px;text-align:center;line-height:1.35;margin:0}
.coin{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE680,#E0A800);border:4px solid #B8860B;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',sans-serif;font-weight:700;color:#7a5a00}
</style></head>
<body>
  <div class="coin" style="width:70px;height:70px;left:90px;top:220px;font-size:24px">Kč</div>
