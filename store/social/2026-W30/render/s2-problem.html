<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&subset=latin-ext&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{width:1080px;height:1920px;background:#15233B;font-family:Nunito,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.msg{background:#fff;color:#15233B;border:5px solid #15233B;border-radius:24px;padding:20px 30px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:34px;box-shadow:6px 6px 0 rgba(0,0,0,.35);margin:14px 0;max-width:760px}
.msg.right{align-self:flex-end;background:#1D5FD8;color:#fff;border-color:#0d1a30}
.msg.mad{background:#E23B2E;color:#fff}
.row{display:flex;width:820px;flex-direction:column}
h2{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:60px;color:#FFD60A;text-align:center;margin:60px 0 10px;letter-spacing:-1px}
</style></head>
<body>
  <h2>Zase ta skupina na chatě…</h2>
  <div class="row">
    <div class="msg" style="align-self:flex-start">Lidi, kdo platil to Lidl?? 😩</div>
    <div class="msg right" style="align-self:flex-end">Já myslim že Pepa? Nebo Ota?</div>
    <div class="msg" style="align-self:flex-start">Já jsem dal chatu a benzín, kolik mi kdo dluží??</div>
    <div class="msg mad" style="align-self:flex-end">NEVÍM, POŠLI TABULKU 😤</div>
    <div class="msg" style="align-self:flex-start">jakou tabulku, vždyť to je chaos</div>
  </div>
</body></html>
