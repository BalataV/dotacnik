<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&subset=latin-ext&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{width:1080px;height:1920px;background:#FFD60A;font-family:Nunito,sans-serif;position:relative;overflow:hidden}
.header{background:#fff;border-bottom:5px solid #15233B;padding:34px 40px 30px}
.brand{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:46px;color:#15233B;letter-spacing:-1px}
.hrow{display:flex;align-items:flex-end;gap:18px;margin-top:22px}
.avatar{width:76px;height:82px;flex:none}
.bubble{position:relative;flex:1;background:#fff;color:#15233B;border:5px solid #15233B;border-radius:22px;padding:18px 24px;font-weight:800;font-size:30px;line-height:1.3;box-shadow:5px 5px 0 #15233B}
.content{padding:36px 40px}
.label{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:38px;color:#15233B;margin:0 0 22px}
.card{background:#fff;border:5px solid #15233B;border-radius:26px;box-shadow:6px 6px 0 #15233B;overflow:hidden;margin-bottom:40px}
.trow{display:flex;align-items:center;gap:20px;padding:26px 28px;border-bottom:3px solid rgba(0,0,0,.08)}
.trow:last-child{border-bottom:none}
.circ{width:56px;height:56px;border-radius:50%;color:#fff;font-weight:800;font-size:24px;display:flex;align-items:center;justify-content:center;flex:none;border:3px solid #15233B}
.tname{flex:1;font-weight:800;font-size:32px;color:#15233B}
.tamt{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:34px}
.callout{background:#15233B;color:#FFD60A;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:42px;text-align:center;padding:30px;border-radius:24px;border:5px solid #15233B;box-shadow:6px 6px 0 rgba(0,0,0,.25);margin-top:10px}
</style></head>
<body>
  <div class="header">
    <div class="brand">Dotačníček</div>
    <div class="hrow">
      <svg class="avatar" viewBox="0 0 100 108" xmlns="http://www.w3.org/2000/svg">
        <rect x="17" y="1" width="66" height="55" rx="28" fill="#B9B1A0"/>
        <rect x="15" y="41" width="13" height="16" rx="8" fill="#F4C9A0" stroke="#15233B" stroke-width="3"/>
        <rect x="72" y="41" width="13" height="16" rx="8" fill="#F4C9A0" stroke="#15233B" stroke-width="3"/>
        <rect x="22" y="9" width="56" height="69" rx="27" fill="#F4C9A0" stroke="#15233B" stroke-width="3"/>
        <rect x="23" y="3" width="54" height="27" rx="24" fill="#C7BFAE" stroke="#15233B" stroke-width="3"/>
        <rect x="30" y="33" width="14" height="5" rx="2.5" fill="#8B8475"/>
        <rect x="56" y="33" width="14" height="5" rx="2.5" fill="#8B8475"/>
        <circle cx="37.5" cy="44.5" r="6.5" fill="#FFFFFF" stroke="#15233B" stroke-width="2"/>
        <circle cx="38.5" cy="46" r="3" fill="#15233B"/>
        <circle cx="62.5" cy="44.5" r="6.5" fill="#FFFFFF" stroke="#15233B" stroke-width="2"/>
        <circle cx="63.5" cy="46" r="3" fill="#15233B"/>
        <rect x="45" y="48" width="11" height="15" rx="5" fill="#E6B488"/>
        <rect x="39" y="64" width="23" height="9" rx="5" fill="#8A3D2E" stroke="#15233B" stroke-width="2"/>
        <path d="M13 103 L13 95 Q13 84 43 84 L57 84 Q87 84 87 95 L87 103 Z" fill="#15233B"/>
        <rect x="45" y="84" width="10" height="17" rx="3" fill="#E23B2E" stroke="#15233B" stroke-width="2"/>
      </svg>
      <div class="bubble">Účtenky nemám, ale kdo co platil, to si pamatuju. 😏</div>
    </div>
  </div>
  <div class="content">
    <div class="label">Chata Krkonoše 🏔️ — Výdaje</div>
    <div class="card">
      <div class="trow"><div class="circ" style="background:#FF5A36">J</div><div class="tname">Buřty a pivo</div><div class="tamt">1 280 Kč</div></div>
      <div class="trow"><div class="circ" style="background:#1D5FD8">O</div><div class="tname">Velký nákup Lidl</div><div class="tamt">1 860 Kč</div></div>
      <div class="trow"><div class="circ" style="background:#1FA06A">P</div><div class="tname">Chata 2 noci</div><div class="tamt">3 200 Kč</div></div>
      <div class="trow"><div class="circ" style="background:#C026D3">J</div><div class="tname">Benzín tam a zpět</div><div class="tamt">600 Kč</div></div>
    </div>
    <div class="callout">Každý naťuká svoje. Appka to sečte za vás.</div>
  </div>
</body></html>
