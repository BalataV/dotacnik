<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&subset=latin-ext&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{width:1080px;height:1920px;background:#15233B;font-family:Nunito,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
h2{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:66px;color:#FFD60A;text-align:center;margin:0 0 60px;letter-spacing:-1px;max-width:820px;line-height:1.15}
.item{display:flex;align-items:center;gap:26px;background:#fff;border:5px solid #15233B;border-radius:24px;padding:28px 34px;box-shadow:7px 7px 0 rgba(255,214,10,.9);margin-bottom:32px;width:840px}
.check{width:64px;height:64px;border-radius:50%;background:#1FA06A;border:4px solid #15233B;color:#fff;font-weight:900;font-size:36px;display:flex;align-items:center;justify-content:center;flex:none}
.item span{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:38px;color:#15233B;line-height:1.25}
</style></head>
<body>
  <h2>Chytré vyrovnání dluhů</h2>
  <div class="item"><div class="check">✓</div><span>Sečte útraty celé party automaticky</span></div>
  <div class="item"><div class="check">✓</div><span>Spočítá nejmíň možných převodů</span></div>
  <div class="item"><div class="check">✓</div><span>Bez tabulek, bez hádek u piva</span></div>
</body></html>
