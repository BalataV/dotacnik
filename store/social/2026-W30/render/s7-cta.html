<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&subset=latin-ext&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{width:1080px;height:1920px;background:#FFD60A;background-image:radial-gradient(#e8c200 3px,transparent 3px);background-size:36px 36px;font-family:Nunito,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.mascot{width:280px;height:302px}
h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:88px;color:#15233B;margin:24px 0 6px;letter-spacing:-2px;text-align:center}
p.tag{font-weight:800;font-size:34px;color:#15233B;opacity:.85;text-align:center;margin:0 0 46px}
.badge{background:#15233B;color:#FFD60A;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:38px;border-radius:20px;padding:24px 44px;box-shadow:6px 6px 0 rgba(0,0,0,.25);border:5px solid #15233B}
.url{margin-top:34px;font-weight:800;font-size:30px;color:#1D5FD8}
.foot{position:absolute;bottom:70px;font-weight:700;font-size:22px;color:#15233B;opacity:.55;text-align:center;max-width:700px}
</style></head>
